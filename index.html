<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">
    <title>Tabata</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-bg-primary: #050508;
            --color-bg-secondary: #0c0c12;
            --color-bg-tertiary: #14141c;
            --color-accent: #ff6b00;
            --color-accent-glow: rgba(255, 107, 0, 0.4);
            --color-accent-dim: rgba(255, 107, 0, 0.15);
            --color-text-primary: #ffffff;
            --color-text-secondary: #6b6b7b;
            --color-text-muted: #3a3a4a;
            --color-success: #00e676;
            --color-danger: #ff1744;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timer-section > * {
            animation: slide-up 0.5s ease backwards;
        }

        .phase-badge-work {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: var(--color-bg-primary);
            box-shadow: 0 0 30px var(--color-accent-glow);
        }

        .phase-badge-rest {
            background: transparent;
            border-color: var(--color-success);
            color: var(--color-success);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
        }

        .phase-badge-ready {
            background: transparent;
            border-color: var(--color-text-secondary);
            color: var(--color-text-secondary);
        }

        .phase-badge-done {
            background: transparent;
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .timer-glow-active {
            animation: pulse-glow 1s ease-in-out infinite;
        }

        .progress-fill-rest {
            background: var(--color-success);
        }

        .progress-fill-done {
            background: var(--color-accent);
        }

        .progress-shine::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
        }
    </style>
</head>
<body class="bg-bg-primary text-text-primary font-sans antialiased flex flex-col min-h-dvh">
    <div class="container relative z-10 flex flex-col flex-1 px-5 py-6 max-w-md mx-auto w-full">
        <header class="flex justify-between items-center pb-4">
            <div class="font-bold text-3xl tracking-[0.15em]">
                TABATA<span class="text-accent">.</span>
            </div>
            <button id="settingsBtn" class="w-11 h-11 bg-bg-secondary border border-bg-tertiary rounded-xl flex items-center justify-center hover:border-accent hover:bg-accent-dim transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 stroke-text-secondary hover:stroke-accent transition-colors">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
                </svg>
            </button>
        </header>

        <section class="timer-section flex-1 flex flex-col justify-center items-center gap-6 py-5">
            <div id="phase" class="phase-badge-ready font-bold text-xl tracking-[0.3em] px-6 py-2 bg-bg-secondary border rounded transition-all">
                GET READY
            </div>
            
            <div class="relative text-center">
                <div id="timerGlow" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 bg-radial-gradient from-accent-glow to-transparent rounded-full opacity-0 pointer-events-none transition-opacity"></div>
                <div id="time" class="font-bold text-[clamp(6rem,35vw,10rem)] leading-none tracking-[0.05em] relative z-10">
                    0:20
                </div>
            </div>

            <div class="w-full max-w-80 px-2">
                <div class="h-1.5 bg-bg-tertiary rounded-full overflow-hidden relative">
                    <div id="progressFill" class="h-full bg-accent rounded-full w-0 transition-[width] duration-100 relative progress-shine"></div>
                </div>
            </div>

            <div class="flex justify-center gap-12 pt-2">
                <div class="text-center">
                    <div class="font-bold text-4xl tracking-[0.05em]">
                        <span id="currentRound">0</span><span class="text-text-secondary">/</span><span id="totalRounds">8</span>
                    </div>
                    <div class="text-xs uppercase tracking-[0.15em] text-text-muted mt-0.5">Round</div>
                </div>
                <div class="text-center">
                    <div class="font-bold text-4xl tracking-[0.05em]">
                        <span id="currentSet">1</span><span class="text-text-secondary">/</span><span id="totalSets">1</span>
                    </div>
                    <div class="text-xs uppercase tracking-[0.15em] text-text-muted mt-0.5">Set</div>
                </div>
            </div>
        </section>

        <div class="flex gap-3 py-5">
            <button id="resetBtn" class="btn-reset flex-[0.4] h-[60px] bg-transparent text-danger border border-danger rounded-lg font-semibold text-sm uppercase tracking-widest hover:bg-danger/10 transition-all active:scale-[0.97] cursor-pointer">
                Reset
            </button>
            <button id="startBtn" class="btn-primary flex-1 h-[60px] bg-accent text-bg-primary rounded-lg font-semibold text-sm uppercase tracking-widest shadow-lg shadow-accent/40 hover:shadow-accent/60 transition-all active:scale-[0.97] cursor-pointer">
                Start
            </button>
        </div>
    </div>

    <div id="settingsOverlay" class="settings-overlay fixed inset-0 bg-bg-primary/90 z-50 opacity-0 invisible transition-opacity duration-300">
        <div class="settings-panel fixed bottom-0 left-0 right-0 bg-bg-secondary rounded-t-3xl p-6 pb-6 max-w-md mx-auto z-50 translate-y-full transition-transform duration-300" style="transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1);">
            <div class="flex justify-between items-center mb-6">
                <div class="font-bold text-2xl tracking-[0.1em]">SETTINGS</div>
                <button id="settingsClose" class="w-9 h-9 bg-bg-tertiary rounded-full flex items-center justify-center cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 stroke-text-secondary">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-bg-tertiary rounded-xl p-4">
                    <label class="block text-xs uppercase tracking-widest text-text-secondary mb-2">Work (sec)</label>
                    <input type="number" id="workTime" value="20" min="5" max="300" class="w-full bg-transparent border-none outline-none text-4xl text-center font-bold focus:text-accent">
                </div>
                <div class="bg-bg-tertiary rounded-xl p-4">
                    <label class="block text-xs uppercase tracking-widest text-text-secondary mb-2">Rest (sec)</label>
                    <input type="number" id="restTime" value="10" min="5" max="300" class="w-full bg-transparent border-none outline-none text-4xl text-center font-bold focus:text-accent">
                </div>
                <div class="bg-bg-tertiary rounded-xl p-4">
                    <label class="block text-xs uppercase tracking-widest text-text-secondary mb-2">Rounds</label>
                    <input type="number" id="rounds" value="8" min="1" max="50" class="w-full bg-transparent border-none outline-none text-4xl text-center font-bold focus:text-accent">
                </div>
                <div class="bg-bg-tertiary rounded-xl p-4">
                    <label class="block text-xs uppercase tracking-widest text-text-secondary mb-2">Sets</label>
                    <input type="number" id="sets" value="1" min="1" max="20" class="w-full bg-transparent border-none outline-none text-4xl text-center font-bold focus:text-accent">
                </div>
            </div>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(frequency = 880, duration = 150, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playTripleBeep() {
            playBeep(880, 100);
            setTimeout(() => playBeep(880, 100), 150);
            setTimeout(() => playBeep(1100, 200), 300);
        }

        function playStartBeep() {
            playBeep(1200, 150);
        }

        function playEndBeep() {
            playBeep(600, 300);
            setTimeout(() => playBeep(500, 300), 200);
            setTimeout(() => playBeep(400, 400), 400);
        }

        const state = {
            workTime: 20,
            restTime: 10,
            rounds: 8,
            sets: 1,
            phase: 'ready',
            currentRound: 0,
            currentSet: 1,
            timeRemaining: 20,
            isRunning: false,
            isPaused: false,
            intervalId: null
        };

        const elements = {
            phase: document.getElementById('phase'),
            time: document.getElementById('time'),
            progressFill: document.getElementById('progressFill'),
            timerGlow: document.getElementById('timerGlow'),
            currentRound: document.getElementById('currentRound'),
            totalRounds: document.getElementById('totalRounds'),
            currentSet: document.getElementById('currentSet'),
            totalSets: document.getElementById('totalSets'),
            startBtn: document.getElementById('startBtn'),
            resetBtn: document.getElementById('resetBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            settingsClose: document.getElementById('settingsClose'),
            settingsPanel: document.querySelector('.settings-panel'),
            workTime: document.getElementById('workTime'),
            restTime: document.getElementById('restTime'),
            rounds: document.getElementById('rounds'),
            sets: document.getElementById('sets')
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            elements.time.textContent = formatTime(state.timeRemaining);
            elements.currentRound.textContent = state.currentRound;
            elements.currentSet.textContent = state.currentSet;
            elements.totalRounds.textContent = state.rounds;
            elements.totalSets.textContent = state.sets;

            const totalTime = state.phase === 'work' ? state.workTime : 
                             state.phase === 'rest' ? state.restTime : 3;
            const progress = (totalTime - state.timeRemaining) / totalTime * 100;
            elements.progressFill.style.width = progress + '%';

            const phaseEl = elements.phase;
            phaseEl.className = 'font-bold text-xl tracking-[0.3em] px-6 py-2 bg-bg-secondary border rounded transition-all';
            
            if (state.phase === 'ready') {
                phaseEl.textContent = 'GET READY';
                phaseEl.classList.add('phase-badge-ready');
            } else if (state.phase === 'work') {
                phaseEl.textContent = 'WORK';
                phaseEl.classList.add('phase-badge-work');
            } else if (state.phase === 'rest') {
                phaseEl.textContent = 'REST';
                phaseEl.classList.add('phase-badge-rest');
            } else if (state.phase === 'done') {
                phaseEl.textContent = 'DONE';
                phaseEl.classList.add('phase-badge-done');
            }

            elements.progressFill.className = 'h-full rounded-full w-0 transition-[width] duration-100 relative progress-shine';
            if (state.phase === 'rest') {
                elements.progressFill.classList.add('progress-fill-rest');
            } else if (state.phase === 'done') {
                elements.progressFill.classList.add('progress-fill-done');
            } else {
                elements.progressFill.classList.add('bg-accent');
            }

            if (state.phase === 'work' && state.isRunning && !state.isPaused) {
                elements.timerGlow.classList.add('opacity-100', 'timer-glow-active');
                elements.timerGlow.classList.remove('opacity-0');
            } else {
                elements.timerGlow.classList.remove('opacity-100', 'timer-glow-active');
                elements.timerGlow.classList.add('opacity-0');
            }
        }

        function startTimer() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!state.isRunning) {
                if (state.phase === 'ready') {
                    state.phase = 'work';
                    state.currentRound = 1;
                    state.timeRemaining = state.workTime;
                    playStartBeep();
                }
                state.isRunning = true;
                state.isPaused = false;
                elements.startBtn.textContent = 'Pause';
            } else if (state.isPaused) {
                state.isPaused = false;
                elements.startBtn.textContent = 'Pause';
            } else {
                state.isPaused = true;
                elements.startBtn.textContent = 'Resume';
            }

            clearInterval(state.intervalId);
            state.intervalId = setInterval(tick, 1000);
            updateDisplay();
        }

        function tick() {
            if (state.isPaused) return;

            state.timeRemaining--;

            if (state.timeRemaining <= 3 && state.timeRemaining > 0) {
                playBeep(660, 80);
            }

            if (state.timeRemaining <= 0) {
                playBeep(880, 200);
                
                if (state.phase === 'work') {
                    if (state.currentRound >= state.rounds) {
                        if (state.currentSet >= state.sets) {
                            state.phase = 'done';
                            state.isRunning = false;
                            clearInterval(state.intervalId);
                            playEndBeep();
                            elements.timerGlow.classList.remove('opacity-100', 'timer-glow-active');
                            elements.timerGlow.classList.add('opacity-0');
                        } else {
                            state.currentSet++;
                            state.currentRound = 1;
                            state.phase = 'rest';
                            state.timeRemaining = state.restTime;
                        }
                    } else {
                        state.currentRound++;
                        state.phase = 'rest';
                        state.timeRemaining = state.restTime;
                    }
                } else if (state.phase === 'rest') {
                    state.phase = 'work';
                    state.timeRemaining = state.workTime;
                }
            }

            updateDisplay();
        }

        function reset() {
            clearInterval(state.intervalId);
            state.phase = 'ready';
            state.currentRound = 0;
            state.currentSet = 1;
            state.timeRemaining = state.workTime;
            state.isRunning = false;
            state.isPaused = false;
            elements.startBtn.textContent = 'Start';
            elements.timerGlow.classList.remove('opacity-100', 'timer-glow-active');
            elements.timerGlow.classList.add('opacity-0');
            updateDisplay();
        }

        function loadSettings() {
            state.workTime = parseInt(elements.workTime.value) || 20;
            state.restTime = parseInt(elements.restTime.value) || 10;
            state.rounds = parseInt(elements.rounds.value) || 8;
            state.sets = parseInt(elements.sets.value) || 1;
            
            if (!state.isRunning) {
                state.timeRemaining = state.workTime;
            }
            
            updateDisplay();
        }

        function openSettings() {
            elements.settingsOverlay.classList.remove('invisible', 'opacity-0');
            elements.settingsOverlay.classList.add('opacity-100', 'visible');
            elements.settingsPanel.style.transform = 'translateY(0)';
        }

        function closeSettings() {
            elements.settingsOverlay.classList.add('invisible', 'opacity-0');
            elements.settingsOverlay.classList.remove('opacity-100', 'visible');
            elements.settingsPanel.style.transform = 'translateY(100%)';
        }

        elements.startBtn.addEventListener('click', startTimer);
        elements.resetBtn.addEventListener('click', reset);
        elements.settingsBtn.addEventListener('click', openSettings);
        elements.settingsClose.addEventListener('click', closeSettings);
        elements.settingsOverlay.addEventListener('click', (e) => {
            if (e.target === elements.settingsOverlay) {
                closeSettings();
            }
        });

        elements.workTime.addEventListener('change', loadSettings);
        elements.restTime.addEventListener('change', loadSettings);
        elements.rounds.addEventListener('change', loadSettings);
        elements.sets.addEventListener('change', loadSettings);

        loadSettings();
        updateDisplay();
    </script>
</body>
</html>
