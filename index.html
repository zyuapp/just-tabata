<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">
    <title>Tabata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-tertiary: #14141c;
            --accent: #ff6b00;
            --accent-glow: rgba(255, 107, 0, 0.4);
            --accent-dim: rgba(255, 107, 0, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #6b6b7b;
            --text-muted: #3a3a4a;
            --success: #00e676;
            --danger: #ff1744;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.15em;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent);
        }

        .settings-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .settings-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-secondary);
            transition: stroke 0.2s;
        }

        .settings-btn:hover svg {
            stroke: var(--accent);
        }

        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 20px 0;
        }

        .phase-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            padding: 8px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .phase-badge.work {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .phase-badge.rest {
            background: transparent;
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
        }

        .phase-badge.ready {
            background: transparent;
            border-color: var(--text-secondary);
            color: var(--text-secondary);
        }

        .phase-badge.done {
            background: transparent;
            border-color: var(--accent);
            color: var(--accent);
        }

        .timer-display {
            position: relative;
            text-align: center;
        }

        .timer-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .timer-glow.active {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .time-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6rem, 35vw, 10rem);
            line-height: 1;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .progress-container {
            width: 100%;
            max-width: 340px;
            padding: 0 10px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear, background 0.3s;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
        }

        .progress-fill.rest {
            background: var(--success);
        }

        .progress-fill.done {
            background: var(--accent);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 48px;
            padding-top: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }

        .stat-value span {
            color: var(--text-secondary);
            font-size: 1.4rem;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 20px 0;
        }

        .btn {
            flex: 1;
            height: 60px;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 30px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
        }

        .btn-reset {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            flex: 0.4;
        }

        .btn-reset:hover {
            background: rgba(255, 23, 68, 0.1);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 8, 0.9);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .settings-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            max-width: 480px;
            margin: 0 auto;
        }

        .settings-overlay.open .settings-panel {
            transform: translateY(0);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
        }

        .settings-close {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .settings-close svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .setting-item {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 16px;
        }

        .setting-item label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .setting-item input {
            width: 100%;
            background: transparent;
            border: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--text-primary);
            text-align: center;
            outline: none;
        }

        .setting-item input:focus {
            color: var(--accent);
        }

        .footer {
            text-align: center;
            padding: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timer-section > * {
            animation: slideUp 0.5s ease backwards;
        }

        .timer-section > *:nth-child(1) { animation-delay: 0.1s; }
        .timer-section > *:nth-child(2) { animation-delay: 0.15s; }
        .timer-section > *:nth-child(3) { animation-delay: 0.2s; }
        .timer-section > *:nth-child(4) { animation-delay: 0.25s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">TABATA<span>.</span></div>
            <button class="settings-btn" id="settingsBtn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
                </svg>
            </button>
        </header>

        <section class="timer-section">
            <div class="phase-badge ready" id="phase">GET READY</div>
            
            <div class="timer-display">
                <div class="timer-glow" id="timerGlow"></div>
                <div class="time-value" id="time">0:20</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat">
                    <div class="stat-value"><span id="currentRound">0</span><span>/</span><span id="totalRounds">8</span></div>
                    <div class="stat-label">Round</div>
                </div>
                <div class="stat">
                    <div class="stat-value"><span id="currentSet">1</span><span>/</span><span id="totalSets">1</span></div>
                    <div class="stat-label">Set</div>
                </div>
            </div>
        </section>

        <div class="controls">
            <button class="btn btn-reset" id="resetBtn">Reset</button>
            <button class="btn btn-primary" id="startBtn">Start</button>
        </div>

    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-header">
                <div class="settings-title">SETTINGS</div>
                <button class="settings-close" id="settingsClose">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>Work (sec)</label>
                    <input type="number" id="workTime" value="20" min="5" max="300">
                </div>
                <div class="setting-item">
                    <label>Rest (sec)</label>
                    <input type="number" id="restTime" value="10" min="5" max="300">
                </div>
                <div class="setting-item">
                    <label>Rounds</label>
                    <input type="number" id="rounds" value="8" min="1" max="50">
                </div>
                <div class="setting-item">
                    <label>Sets</label>
                    <input type="number" id="sets" value="1" min="1" max="20">
                </div>
            </div>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(frequency = 880, duration = 150, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playTripleBeep() {
            playBeep(880, 100);
            setTimeout(() => playBeep(880, 100), 150);
            setTimeout(() => playBeep(1100, 200), 300);
        }

        function playStartBeep() {
            playBeep(1200, 150);
        }

        function playEndBeep() {
            playBeep(600, 300);
            setTimeout(() => playBeep(500, 300), 200);
            setTimeout(() => playBeep(400, 400), 400);
        }

        const state = {
            workTime: 20,
            restTime: 10,
            rounds: 8,
            sets: 1,
            phase: 'ready',
            currentRound: 0,
            currentSet: 1,
            timeRemaining: 20,
            isRunning: false,
            isPaused: false,
            intervalId: null
        };

        const elements = {
            phase: document.getElementById('phase'),
            time: document.getElementById('time'),
            progressFill: document.getElementById('progressFill'),
            timerGlow: document.getElementById('timerGlow'),
            currentRound: document.getElementById('currentRound'),
            totalRounds: document.getElementById('totalRounds'),
            currentSet: document.getElementById('currentSet'),
            totalSets: document.getElementById('totalSets'),
            startBtn: document.getElementById('startBtn'),
            resetBtn: document.getElementById('resetBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            settingsClose: document.getElementById('settingsClose'),
            workTime: document.getElementById('workTime'),
            restTime: document.getElementById('restTime'),
            rounds: document.getElementById('rounds'),
            sets: document.getElementById('sets')
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            elements.time.textContent = formatTime(state.timeRemaining);
            elements.currentRound.textContent = state.currentRound;
            elements.currentSet.textContent = state.currentSet;
            elements.totalRounds.textContent = state.rounds;
            elements.totalSets.textContent = state.sets;

            const totalTime = state.phase === 'work' ? state.workTime : 
                             state.phase === 'rest' ? state.restTime : 3;
            const progress = (totalTime - state.timeRemaining) / totalTime * 100;
            elements.progressFill.style.width = progress + '%';

            elements.phase.className = 'phase-badge ' + state.phase;
            
            if (state.phase === 'ready') {
                elements.phase.textContent = 'GET READY';
            } else if (state.phase === 'work') {
                elements.phase.textContent = 'WORK';
            } else if (state.phase === 'rest') {
                elements.phase.textContent = 'REST';
            } else if (state.phase === 'done') {
                elements.phase.textContent = 'DONE';
            }

            elements.progressFill.className = 'progress-fill ' + 
                (state.phase === 'rest' ? 'rest' : state.phase === 'done' ? 'done' : '');

            if (state.phase === 'work' && state.isRunning && !state.isPaused) {
                elements.timerGlow.classList.add('active');
            } else {
                elements.timerGlow.classList.remove('active');
            }
        }

        function startTimer() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!state.isRunning) {
                if (state.phase === 'ready') {
                    state.phase = 'work';
                    state.currentRound = 1;
                    state.timeRemaining = state.workTime;
                    playStartBeep();
                }
                state.isRunning = true;
                state.isPaused = false;
                elements.startBtn.textContent = 'Pause';
            } else if (state.isPaused) {
                state.isPaused = false;
                elements.startBtn.textContent = 'Pause';
            } else {
                state.isPaused = true;
                elements.startBtn.textContent = 'Resume';
            }

            clearInterval(state.intervalId);
            state.intervalId = setInterval(tick, 1000);
            updateDisplay();
        }

        function tick() {
            if (state.isPaused) return;

            state.timeRemaining--;

            if (state.timeRemaining <= 3 && state.timeRemaining > 0) {
                playBeep(660, 80);
            }

            if (state.timeRemaining <= 0) {
                playBeep(880, 200);
                
                if (state.phase === 'work') {
                    if (state.currentRound >= state.rounds) {
                        if (state.currentSet >= state.sets) {
                            state.phase = 'done';
                            state.isRunning = false;
                            clearInterval(state.intervalId);
                            playEndBeep();
                            elements.timerGlow.classList.remove('active');
                        } else {
                            state.currentSet++;
                            state.currentRound = 1;
                            state.phase = 'rest';
                            state.timeRemaining = state.restTime;
                        }
                    } else {
                        state.currentRound++;
                        state.phase = 'rest';
                        state.timeRemaining = state.restTime;
                    }
                } else if (state.phase === 'rest') {
                    state.phase = 'work';
                    state.timeRemaining = state.workTime;
                }
            }

            updateDisplay();
        }

        function reset() {
            clearInterval(state.intervalId);
            state.phase = 'ready';
            state.currentRound = 0;
            state.currentSet = 1;
            state.timeRemaining = state.workTime;
            state.isRunning = false;
            state.isPaused = false;
            elements.startBtn.textContent = 'Start';
            elements.timerGlow.classList.remove('active');
            updateDisplay();
        }

        function loadSettings() {
            state.workTime = parseInt(elements.workTime.value) || 20;
            state.restTime = parseInt(elements.restTime.value) || 10;
            state.rounds = parseInt(elements.rounds.value) || 8;
            state.sets = parseInt(elements.sets.value) || 1;
            
            if (!state.isRunning) {
                state.timeRemaining = state.workTime;
            }
            
            updateDisplay();
        }

        function openSettings() {
            elements.settingsOverlay.classList.add('open');
        }

        function closeSettings() {
            elements.settingsOverlay.classList.remove('open');
        }

        elements.startBtn.addEventListener('click', startTimer);
        elements.resetBtn.addEventListener('click', reset);
        elements.settingsBtn.addEventListener('click', openSettings);
        elements.settingsClose.addEventListener('click', closeSettings);
        elements.settingsOverlay.addEventListener('click', (e) => {
            if (e.target === elements.settingsOverlay) {
                closeSettings();
            }
        });

        elements.workTime.addEventListener('change', loadSettings);
        elements.restTime.addEventListener('change', loadSettings);
        elements.rounds.addEventListener('change', loadSettings);
        elements.sets.addEventListener('change', loadSettings);

        loadSettings();
        updateDisplay();
    </script>
</body>
</html>
